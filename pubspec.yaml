name: stitch_mate
description: "StitchMate - A lightweight, beautifully designed mobile companion app for knitters and crocheters."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.1

  # Local Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI & Assets
  google_fonts: ^4.0.4
  flutter_svg: ^2.0.9

  # Audio & Haptics
  audioplayers: ^5.2.1
  vibration: ^1.8.4

  # Image & Files
  image_picker: ^1.0.7
  share_plus: ^7.2.2
  path_provider: ^2.1.2

  # Internationalisation & Formatting
  intl: ^0.18.1

  # Background Tasks
  flutter_foreground_task: ^6.1.2

  # Utilities
  uuid: ^4.3.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/data/stitches.json